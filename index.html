<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implementaciones - Barcodes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* 🎥 FONDO LOTTIE */
#background-lottie {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* CONTENEDOR */
.container {
  position: relative;
  z-index: 2;
  width: 420px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 25px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  text-align: center;
  color: white;
}

/* BOT */
#lottie-bot {
  width: 150px;
  margin: auto;
}

/* INPUT */
.search-container input {
  width: 70%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}

/* RESULTADO */
.resultado {
  margin-top: 20px;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.15);
  animation: fadeSlide 0.4s ease;
}

.oculto {
  display: none;
}

.folio-label {
  font-weight: bold;
  margin-bottom: 15px;
  color: #60a5fa;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: white;
  color: black;
  padding: 12px;
  border-radius: 15px;
}

.card img {
  width: 100%;
  margin-top: 8px;
}

/* Animación */
@keyframes fadeSlide {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- 🎥 Fondo -->
<div id="background-lottie"></div>

<div class="container">

  <h2>Implementaciones Mainbit</h2>

  <!-- 🤖 BOT -->
  <div id="lottie-bot"></div>

  <!-- 🔍 INPUT -->
  <div class="search-container">
    <input type="text" id="folioInput" placeholder="Escribe el folio a consultar ...">
  </div>

  <!-- 📦 RESULTADOS -->
  <div id="resultado" class="resultado oculto">

    <div class="folio-label" id="folioLabel"></div>

    <div class="cards">

      <div class="card">
        <div>CPU</div>
        <img id="cpu">
      </div>

      <div class="card">
        <div>Monitor</div>
        <img id="monitor">
      </div>

      <div class="card">
        <div>UPS</div>
        <img id="ups">
      </div>

    </div>

  </div>

</div>

<script>
// 🎥 LOTTIE
lottie.loadAnimation({
  container: document.getElementById("background-lottie"),
  path: "./background2.json",
  renderer: "canvas",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("lottie-bot"),
  path: "./Hi_SN_bot.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

// 📊 DATA
let baseDatos = [];
let timeout = null;

fetch("data.csv")
  .then(res => res.text())
  .then(text => {
    const filas = text.split("\\n").slice(1);

    baseDatos = filas.map(f => {
      const [folio, cpu, monitor, ups] = f.split(",");
      return { folio, cpu, monitor, ups };
    });
  });

// 🔹 Barcode
function generarBarcode(valor) {
  return `https://barcodeapi.org/api/code128/${valor}`;
}

// 🔍 Buscar
function buscar(folioInput) {
  const item = baseDatos.find(x => x.folio === folioInput);

  if (!item) {
    document.getElementById("resultado").classList.add("oculto");
    return;
  }

  document.getElementById("resultado").classList.remove("oculto");
  document.getElementById("folioLabel").innerText = "Folio: " + item.folio;

  document.getElementById("cpu").src = generarBarcode(item.cpu);
  document.getElementById("monitor").src = generarBarcode(item.monitor);
  document.getElementById("ups").src = generarBarcode(item.ups);
}

// ⌨️ Tiempo real
document.getElementById("folioInput").addEventListener("input", function(e) {
  const valor = e.target.value.trim();

  clearTimeout(timeout);

  timeout = setTimeout(() => {
    if (valor.length > 2) {
      buscar(valor);
    } else {
      document.getElementById("resultado").classList.add("oculto");
    }
  }, 250);
});
</script>

</body>
</html>
