<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Implementaciones - Barcodes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
* {
  margin: 0;
  margin: 0;
  padding: 0;
  overflow: inherit;
  font-family: Arial, sans-serif;
  text-align: center;
  text-size-adjust: 100%;
}
.fullscreen-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

#background-lottie {
  position: fixed;
  background-color: rgba(0, 110, 200, 0.65);
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;

}

.central-container {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  width: 55vw;
  height: 95vh;
  background: rgba(255, 255, 255, 0.75);
  border-radius: 45px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  display: flex;
  flex-direction: column;
  transition: all 0.5s ease;
  backdrop-filter: blur(10px);

}

.central-container.expandido {
  width: 85vw;
  flex-direction: row;
}

.left-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 30px;
  border-right: 1px solid #f0f0f0;
}

.right-panel {
  flex: 1;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 30px;
  overflow-y: auto;
}

.central-container.expandido .right-panel {
  display: flex;
}

h2 {
  color: #333;
  font-size: 28px;
  margin-bottom: 30px;
  text-align: center;
  font-weight: 600;
}

#lottie-bot {
  width: 200px;
  height: 200px;
  margin-bottom: 20px;
}

.search-container {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.search-container input {
  padding: 14px 20px;
  border-radius: 12px;
  border: 2px solid #e0e0e0;
  width: 85%;
  font-size: 16px;
  transition: all 0.3s ease;
  background: #f9f9f9;
}

.search-container input:focus {
  outline: none;
  border-color: #667eea;
  background: rgba(255, 255, 255, 0.75);
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
}

.card {
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
  transition: all 0.3s ease;
  border: 1px solid rgba(255, 255, 255, 0.5);
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
}

.card div:first-child {
  font-weight: 600;
  color: #667eea;
  margin-bottom: 12px;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card img {
  width: 180px;
  height: auto;
  background: white;
  padding: 10px;
  border-radius: 8px;
}

#folioLabel {
  font-weight: 700;
  color: #667eea;
  margin-bottom: 25px;
  font-size: 18px;
  text-align: center;
}

#logo-mbt {
  position: fixed;
  bottom: 20px;
  right: 30px;
  width: 70px;
  z-index: 10;
}

@media (max-width: 768px) {
  .central-container {
    width: 90vw;
    height: 75vh;
  }

  .central-container.expandido {
    flex-direction: column;
  }

  .left-panel {
    border-right: none;
    border-bottom: 1px solid #f0f0f0;
  }
}
</style>
</head>

<body>
<div id="background-lottie"></div>

<div class="central-container" id="mainContainer">
  <div class="left-panel">
    <h2>Implementaciones Mainbit</h2>
    <div id="lottie-bot"></div>
    <div class="search-container">
      <input type="text" id="folioInput" placeholder="Escribe el folio a consultar ...">
    </div>
  </div>

  <div class="right-panel" id="resultado">
    <div style="width: 100%;">
      <div id="folioLabel"></div>
      <div class="card">
        <div>CPU</div>
        <img id="cpu">
      </div>
      <div class="card">
        <div>Monitor</div>
        <img id="monitor">
      </div>
      <div class="card">
        <div>UPS</div>
        <img id="ups">
      </div>
    </div>
  </div>
</div>

<div id="logo-mbt"></div>
<div id="logo-ds"></div>

<script>
lottie.loadAnimation({
  container: document.getElementById("background-lottie"),
  path: "./background2.json",
  renderer: "canvas",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("lottie-bot"),
  path: "./Hi_SN_bot.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("logo-mbt"),
  path: "./Logo_Mbt_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("logo-mbt"),
  path: "./Logo_DS_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

let baseDatos = [];
let timeout = null;

fetch("data.csv")
  .then(res => res.text())
  .then(text => {
    const filas = text.split("\n").slice(1);
    baseDatos = filas.map(f => {
      const [folio, cpu, monitor, ups] = f.split(",");
      return { folio, cpu, monitor, ups };
    });
  });

function generarBarcode(valor) {
  return `https://barcodeapi.org/api/code128/${valor}`;
}

function buscar(folioInput) {
  const item = baseDatos.find(x => x.folio === folioInput);
  if (!item) return;

  document.getElementById("mainContainer").classList.add("expandido");
  document.getElementById("folioLabel").innerText = "Folio: " + item.folio;
  document.getElementById("cpu").src = generarBarcode(item.cpu);
  document.getElementById("monitor").src = generarBarcode(item.monitor);
  document.getElementById("ups").src = generarBarcode(item.ups);
}

document.getElementById("folioInput").addEventListener("input", function(e) {
  const valor = e.target.value.trim();
  clearTimeout(timeout);
  timeout = setTimeout(() => {
    if (valor.length > 2) {
      buscar(valor);
    }
  }, 300);
});
</script>
</body>
</html>
