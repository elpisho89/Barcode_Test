<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Implementaciones - Barcodes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
/* ===== RESET Y VIEWPORT ===== */
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

* {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

/* ===== FULLSCREEN ===== */
.fullscreen-container {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* ===== FONDO LOTTIE ===== */
#background-lottie {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.5;
}

/* ===== CONTENEDOR CENTRAL ===== */
.central-container {
  position: relative;
  z-index: 2;
  width: 55vw;
  height: 85vh;
  background: rgba(236,236,250,.9);
  border-radius: 45px;
  box-shadow: 0 25px 70px rgba(0,0,0,.35);
  display: flex;
  transition: .5s ease;
  backdrop-filter: blur(12px);
}

.central-container.expandido {
  width: 85vw;
}

/* ===== LOGO MAINBIT ===== */
#logo-mbt {
  position: absolute;
  top: 20px;
  left: 28px;
  width: 110px;
  z-index: 5;
}

/* ===== PANEL IZQUIERDO ===== */
.left-panel {
  flex: 1;
  padding: 40px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.central-container.expandido .left-panel {
  border-right: 1px solid rgba(0,0,0,.08);
}

/* ✅ TÍTULO AJUSTADO */
.left-panel h2 {
  margin-bottom: 22px;
  font-size: 20px;
  font-weight: 600;
  color: #44516b;
  letter-spacing: .4px;
}

/* Bot */
#lottie-bot {
  width: 200px;
  margin-bottom: 22px;
}

/* Input */
.search-container input {
  width: 95%;
  padding: 10px 14px;
  border-radius: 25px;
  border: 2px solid rgba(57,16,123,.75);
  font-size: 14px;
}

.search-container input::placeholder {
  font-size: 12px;
}

.search-container input:focus {
  outline: none;
  border-color: #5f6cff;
}

/* Folio */
#folioLabel {
  margin-top: 16px;
  font-weight: 700;
  font-size: 15px;
  color: #2f6dff;
}

/* ===== PANEL DERECHO ===== */
.right-panel {
  flex: 1;
  display: none;
  padding: 40px 30px;
  overflow-y: auto;
  scrollbar-width: none;
}

.right-panel::-webkit-scrollbar {
  display: none;
}

.central-container.expandido .right-panel {
  display: flex;
  flex-direction: column;
}

/* Cards */
.card {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 16px;
  background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
}

.card .label {
  min-width: 90px;
  text-align: right;
  font-weight: 600;
  font-size: 13px;
  color: #5c78d8;
}

.card img {
  width: 280px;
  background: white;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="fullscreen-container">
  <div id="background-lottie"></div>

  <div class="central-container" id="mainContainer">

    <div id="logo-mbt"></div>

    <!-- IZQUIERDA -->
    <div class="left-panel">
      <h2>Implementaciones Mainbit</h2>
      <div id="lottie-bot"></div>

      <div class="search-container">
        <input id="folioInput" placeholder="Escribe el folio a consultar..." />
      </div>

      <div id="folioLabel"></div>
    </div>

    <!-- DERECHA -->
    <div class="right-panel">
      <div class="card">
        <span class="label">CPU</span>
        <img id="cpu">
      </div>
      <div class="card">
        <span class="label">Monitor</span>
        <img id="monitor">
      </div>
      <div class="card">
        <span class="label">UPS</span>
        <img id="ups">
      </div>
    </div>

  </div>
</div>

<script>
/* ===== BOT LOTTIE ===== */
const botContainer = document.getElementById("lottie-bot");
let botAnimation = null;

function loadBot(path) {
  if (botAnimation) botAnimation.destroy();
  botAnimation = lottie.loadAnimation({
    container: botContainer,
    path,
    renderer: "svg",
    loop: true,
    autoplay: true
  });
}

loadBot("./Hi_SN_bot.json");

/* ===== FONDO LOTTIE (CLAVE) ===== */
lottie.loadAnimation({
  container: document.getElementById("background-lottie"),
  path: "./background1.json",
  renderer: "canvas",
  loop: true,
  autoplay: true,
  rendererSettings: {
    preserveAspectRatio: "xMidYMid slice", // ✅ CLAVE
    clearCanvas: true
  }
});

/* Logo */
lottie.loadAnimation({
  container: document.getElementById("logo-mbt"),
  path: "./Logo_Mbt_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

/* ===== DATA ===== */
let baseDatos = [];

fetch("data.csv")
  .then(r => r.text())
  .then(t => {
    baseDatos = t.split("\n").slice(1).map(f => {
      const [folio,cpu,monitor,ups] = f.split(",");
      return {folio,cpu,monitor,ups};
    });
  });

function barcode(v) {
  return `https://barcodeapi.org/api/code128/${v}`;
}

let timeout = null;

folioInput.addEventListener("input", e => {
  const valor = e.target.value.trim();
  clearTimeout(timeout);

  if (!valor) {
    mainContainer.classList.remove("expandido");
    folioLabel.textContent = "";
    loadBot("./Hi_SN_bot.json");
    return;
  }

  loadBot("./Search_SN_bot.json");

  timeout = setTimeout(() => {
    const item = baseDatos.find(x => x.folio === valor);
    if (!item) return;

    mainContainer.classList.add("expandido");
    folioLabel.textContent = "Folio: " + item.folio;

    cpu.src = barcode(item.cpu);
    monitor.src = barcode(item.monitor);
    ups.src = barcode(item.ups);

    loadBot("./Confused_SN_bot.json");
  }, 400);
});
</script>

</body>
</html>
