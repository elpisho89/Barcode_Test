<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Implementaciones - Barcodes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  box-sizing: border-box;
}

body {
  overflow: hidden;
}

/* ===== CONTENEDOR FULLSCREEN ===== */
.fullscreen-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

/* Fondo Lottie */
#background-lottie {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.35;
  pointer-events: none;
}

/* Logo Mainbit (rojo) */
#logo-mbt {
  position: fixed;
  top: 20px;
  left: 25px;
  width: 110px;
  z-index: 10;
}

/* ===== TARJETA CENTRAL ===== */
.central-container {
  position: relative;
  z-index: 2;
  width: 55vw;
  height: 85vh;
  background: rgba(255,255,255,0.75);
  border-radius: 45px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  display: flex;
  flex-direction: column;
  transition: all .5s ease;
  backdrop-filter: blur(10px);
}

/* Expandido */
.central-container.expandido {
  width: 85vw;
  flex-direction: row;
}

/* Panel izquierdo */
.left-panel {
  flex: 1;
  padding: 40px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-right: 1px solid #eaeaea;
}

.left-panel h2 {
  margin-bottom: 25px;
  font-size: 26px;
  font-weight: 600;
}

/* Bot */
#lottie-bot {
  width: 200px;
  margin-bottom: 20px;
}

/* Input */
.search-container input {
  width: 85%;
  padding: 14px 18px;
  border-radius: 12px;
  border: 2px solid #ddd;
  font-size: 16px;
}

.search-container input:focus {
  outline: none;
  border-color: #667eea;
}

/* ===== PANEL DERECHO ===== */
.right-panel {
  flex: 1;
  display: none;
  padding: 40px 30px;
  overflow-y: auto;
}

.central-container.expandido .right-panel {
  display: flex;
  flex-direction: column;
}

#folioLabel {
  text-align: center;
  font-weight: 700;
  color: #667eea;
  margin-bottom: 24px;
}

/* ===== CARDS (ETIQUETA AL LADO) ===== */
.card {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 18px 20px;
  margin-bottom: 20px;
  border-radius: 16px;
  background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
  box-shadow: 0 5px 15px rgba(0,0,0,.08);
}

/* etiqueta lateral */
.card .label {
  min-width: 90px;
  text-align: right;
  font-weight: 600;
  color: #667eea;
  text-transform: uppercase;
  font-size: 14px;
}

/* código grande */
.card img {
  width: 280px;
  background: #fff;
  padding: 10px;
  border-radius: 8px;
}

/* Responsive */
@media (max-width:768px) {
  .central-container,
  .central-container.expandido {
    width: 90vw;
    height: 85vh;
    flex-direction: column;
  }

  .left-panel {
    border-right: none;
    border-bottom: 1px solid #eaeaea;
  }

  .card {
    flex-direction: column;
  }

  .card .label {
    text-align: center;
  }
}
</style>
</head>

<body>

<div class="fullscreen-container">

  <div id="background-lottie"></div>
  <div id="logo-mbt"></div>

  <div class="central-container" id="mainContainer">

    <!-- IZQUIERDA -->
    <div class="left-panel">
      <h2>Implementaciones Mainbit</h2>
      <div id="lottie-bot"></div>
      <div class="search-container">
        <input id="folioInput" placeholder="Escribe el folio a consultar ...">
      </div>
    </div>

    <!-- DERECHA -->
    <div class="right-panel">
      <div id="folioLabel"></div>

      <div class="card">
        <span class="label">CPU</span>
        <img id="cpu">
      </div>

      <div class="card">
        <span class="label">Monitor</span>
        <img id="monitor">
      </div>

      <div class="card">
        <span class="label">UPS</span>
        <img id="ups">
      </div>

    </div>
  </div>
</div>

<script>
/* LOTTIES */
lottie.loadAnimation({
  container: document.getElementById("background-lottie"),
  path: "./background2.json",
  renderer: "canvas",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("lottie-bot"),
  path: "./Hi_SN_bot.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("logo-mbt"),
  path: "./Logo_Mbt_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

/* DATA */
let baseDatos = [];
let timeout = null;

fetch("data.csv")
  .then(r => r.text())
  .then(t => {
    baseDatos = t.split("\n").slice(1).map(f => {
      const [folio,cpu,monitor,ups] = f.split(",");
      return {folio,cpu,monitor,ups};
    });
  });

function barcode(v){
  return `https://barcodeapi.org/api/code128/${v}`;
}

function buscar(f){
  const x = baseDatos.find(i => i.folio === f);
  if(!x) return;

  document.getElementById("mainContainer").classList.add("expandido");
  document.getElementById("folioLabel").innerText = "Folio: " + x.folio;

  cpu.src = barcode(x.cpu);
  monitor.src = barcode(x.monitor);
  ups.src = barcode(x.ups);
}

folioInput.addEventListener("input",e=>{
  clearTimeout(timeout);
  const v = e.target.value.trim();
  timeout = setTimeout(()=>{
    if(v.length>2) buscar(v);
  },300);
});
</script>

</body>
</html>
