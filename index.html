<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta de Equipos</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }

    .container {
        max-width: 420px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    input {
        padding: 10px;
        width: 80%;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
    }

    .folio {
        margin: 20px 0;
        font-size: 18px;
        font-weight: bold;
        color: #4f46e5;
        background: #eef2ff;
        padding: 8px;
        border-radius: 8px;
    }

    .gallery {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .item {
        background: #f9fafb;
        padding: 15px;
        border-radius: 10px;
    }

    .item-title {
        font-size: 14px;
        color: #555;
        margin-bottom: 10px;
    }

    img {
        width: 100%;
    }

    .status {
        font-size: 12px;
        color: #999;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Consulta por Folio</h2>

    <input type="text" id="inputFolio" placeholder="Escribe el folio...">

    <div class="folio" id="folio">—</div>

    <div class="gallery">
        <div class="item">
            <div class="item-title">CPU</div>
            <img id="cpu">
        </div>

        <div class="item">
            <div class="item-title">Monitor</div>
            <img id="monitor">
        </div>

        <div class="item">
            <div class="item-title">UPS</div>
            <img id="ups">
        </div>
    </div>

    <div class="status" id="status"></div>
</div>

<script>
let baseDatos = [];
let timeout = null;

// 🔹 Cargar CSV
fetch("data.csv")
  .then(res => res.text())
  .then(text => {
      const filas = text.split("\n").slice(1);

      baseDatos = filas.map(f => {
          const [folio, cpu, monitor, ups] = f.split(",");
          return { folio, cpu, monitor, ups };
      });

      document.getElementById("status").innerText = "Base cargada ✔";
  });

// 🔹 Barcode
function generarBarcode(valor) {
    return `https://barcodeapi.org/api/code128/${valor}`;
}

// 🔹 Buscar
function buscar(folioInput) {
    const item = baseDatos.find(x => x.folio === folioInput);

    if (!item) {
        document.getElementById("folio").innerText = "No encontrado";
        document.getElementById("cpu").src = "";
        document.getElementById("monitor").src = "";
        document.getElementById("ups").src = "";
        return;
    }

    document.getElementById("folio").innerText = "Folio: " + item.folio;
    document.getElementById("cpu").src = generarBarcode(item.cpu);
    document.getElementById("monitor").src = generarBarcode(item.monitor);
    document.getElementById("ups").src = generarBarcode(item.ups);
}

// 🔹 Evento en tiempo real (con debounce)
document.getElementById("inputFolio").addEventListener("input", function(e) {
    const valor = e.target.value.trim();

    clearTimeout(timeout);

    timeout = setTimeout(() => {
        if (valor.length > 2) { // evita buscar con 1 letra
            buscar(valor);
        }
    }, 300); // 300ms = más fluido
});
</script>

</body>
</html>
