<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Implementaciones - Barcodes</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* Fondo */
#background-lottie {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 110, 200, 0.65);
  z-index: 0;
}

/* Contenedor principal */
.central-container {
  background: rgba(255, 255, 255, 0.85);
  border-radius: 40px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  width: 420px;
  margin: 60px auto;
  padding: 25px;
  position: relative;
  z-index: 2;
}

/* Bot */
#lottie-bot {
  width: 150px;
  margin: auto;
}

/* Input */
.search-container input {
  padding: 10px;
  width: 70%;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* Resultado */
#resultado {
  margin-top: 15px;
  display: none;
}

#folioLabel {
  font-weight: bold;
  color: #0078d4;
  margin-bottom: 10px;
}

.card {
  background: #f5f5f5;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.card img {
  width: 200px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>

<body>

<!-- 🎥 Fondo -->
<div id="background-lottie"></div>

<div class="central-container">

  <h2>Implementaciones Mainbit</h2>

  <!-- 🤖 BOT -->
  <div id="lottie-bot"></div>

  <!-- 🔍 INPUT -->
  <div class="search-container">
    <input type="text" id="folioInput" placeholder="Escribe el folio a consultar ...">
  </div>

  <!-- 📦 RESULTADOS -->
  <div id="resultado">

    <div id="folioLabel"></div>

    <div class="card">
      <div>CPU</div>
      <img id="cpu">
    </div>

    <div class="card">
      <div>Monitor</div>
      <img id="monitor">
    </div>

    <div class="card">
      <div>UPS</div>
      <img id="ups">
    </div>

  </div>

</div>

<script>
// 🎥 LOTTIE
lottie.loadAnimation({
  container: document.getElementById("background-lottie"),
  path: "./background2.json",
  renderer: "canvas",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("lottie-bot"),
  path: "./Hi_SN_bot.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

// 📊 DATA
let baseDatos = [];
let timeout = null;

fetch("data.csv")
  .then(res => res.text())
  .then(text => {
    const filas = text.split("\n").slice(1);

    baseDatos = filas.map(f => {
      const [folio, cpu, monitor, ups] = f.split(",");
      return { folio, cpu, monitor, ups };
    });
  });

// 🔹 Barcode
function generarBarcode(valor) {
  return `https://barcodeapi.org/api/code128/${valor}`;
}

// 🔍 Buscar
function buscar(folioInput) {
  const item = baseDatos.find(x => x.folio === folioInput);

  if (!item) {
    document.getElementById("resultado").style.display = "none";
    return;
  }

  document.getElementById("resultado").style.display = "block";
  document.getElementById("folioLabel").innerText = "Folio: " + item.folio;

  document.getElementById("cpu").src = generarBarcode(item.cpu);
  document.getElementById("monitor").src = generarBarcode(item.monitor);
  document.getElementById("ups").src = generarBarcode(item.ups);
}

// 🔹 Tiempo real
document.getElementById("folioInput").addEventListener("input", function(e) {
  const valor = e.target.value.trim();

  clearTimeout(timeout);

  timeout = setTimeout(() => {
    if (valor.length > 2) {
      buscar(valor);
    } else {
      document.getElementById("resultado").style.display = "none";
    }
  }, 300);
});
</script>

</body>
</html>
