<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Implementaciones - Barcodes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body { overflow: hidden; }

/* ===== FULLSCREEN ===== */
.fullscreen-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

#background-lottie {
  position: fixed;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover;
  inset: 0;
  z-index: 0;
  opacity: .5;
  pointer-events: none;
}

/* ===== CONTENEDOR CENTRAL ===== */
.central-container {
  position: relative;
  z-index: 2;
  width: 55vw;
  height: 85vh;
  background: rgba(255,255,255,.75);
  border-radius: 45px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  display: flex;
  transition: .5s;
  backdrop-filter: blur(10px);
}

.central-container.expandido {
  width: 85vw;
}

/* Logo Mainbit (zona azul) */
#logo-mbt {
  position: absolute;
  top: 20px;
  left: 25px;
  width: 110px;
  z-index: 5;
}

/* ===== IZQUIERDA ===== */
.left-panel {
  flex: 1;
  padding: 40px 30px;
  border-right: 1px solid #e0e0e0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-right: none;
}

.left-panel h2 {
  margin-bottom: 20px;
}

#lottie-bot {
  width: 200px;
  margin-bottom: 20px;
}

.search-container input {
  width: 95%;
  padding: 14px;
  border-radius: 12px;
  border: 2px solid rgba(57,16,123,.75);
  font-size: 14px;
}

#folioLabel {
  margin-top: 15px;
  font-weight: 700;
  color: #1e78ff;
  font-size: 16px;
}

/* ===== DERECHA ===== */
.right-panel {
  flex: 1;
  display: none;
  padding: 40px 30px;
  overflow-y: auto;
  scrollbar-width: none;
}

.right-panel::-webkit-scrollbar {
  display: none;
}

.central-container.expandido .right-panel {
  display: flex;
  flex-direction: column;
}

/* Cards */
.card {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 16px;
  background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
}

.card .label {
  min-width: 90px;
  text-align: right;
  font-weight: 600;
  color: #667eea;
}

.card img {
  width: 280px;
  background: white;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="fullscreen-container">
  <div id="background-lottie"></div>

  <div class="central-container" id="mainContainer">

    <div id="logo-mbt"></div>

    <div class="left-panel">
      <h2>Implementaciones Mainbit</h2>
      <div id="lottie-bot"></div>

      <div class="search-container">
        <input id="folioInput" placeholder="Escribe el folio a consultar..." />
      </div>

      <!-- ✅ FOLIO MOVIDO AQUÍ (VERDE) -->
      <div id="folioLabel"></div>
    </div>

    <div class="right-panel">
      <div class="card">
        <span class="label">CPU</span>
        <img id="cpu">
      </div>
      <div class="card">
        <span class="label">Monitor</span>
        <img id="monitor">
      </div>
      <div class="card">
        <span class="label">UPS</span>
        <img id="ups">
      </div>
    </div>

  </div>
</div>

<script>
/* ===== LOTTIES ===== */
const botContainer = document.getElementById("lottie-bot");
let botAnimation = null;

function loadBot(path) {
  if (botAnimation) botAnimation.destroy();
  botAnimation = lottie.loadAnimation({
    container: botContainer,
    path,
    renderer: "svg",
    loop: true,
    autoplay: true
  });
}

loadBot("./Hi_SN_bot.json");

lottie.loadAnimation({
  container: background = document.getElementById("background-lottie"),
  path: "./background1.json",
  renderer: "canvas",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("logo-mbt"),
  path: "./Logo_Mbt_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

/* ===== DATA ===== */
let baseDatos = [];

fetch("data.csv")
  .then(r => r.text())
  .then(t => {
    baseDatos = t.split("\n").slice(1).map(f => {
      const [folio,cpu,monitor,ups] = f.split(",");
      return {folio,cpu,monitor,ups};
    });
  });

function barcode(v){
  return `https://barcodeapi.org/api/code128/${v}`;
}

let timeout = null;

folioInput.addEventListener("input", e => {
  const valor = e.target.value.trim();
  clearTimeout(timeout);

  if (!valor) {
    mainContainer.classList.remove("expandido");
    folioLabel.textContent = "";
    loadBot("./Hi_SN_bot.json");
    return;
  }

  loadBot("./Search_SN_bot.json");

  timeout = setTimeout(() => {
    const item = baseDatos.find(x => x.folio === valor);
    if (!item) return;

    mainContainer.classList.add("expandido");
    folioLabel.textContent = "Folio: " + item.folio;

    cpu.src = barcode(item.cpu);
    monitor.src = barcode(item.monitor);
    ups.src = barcode(item.ups);

    loadBot("./Confused_SN_bot.json");
  }, 400);
});
</script>

</body>
</html>
