<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Implementaciones - Barcodes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Fondo SIEMPRE completo */
#background-lottie {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
}

/* Contenedor principal */
.central-container {
  position: relative;
  z-index: 2;
  width: 50vw;
  height: 90vh;
  margin: auto;
  margin-top: 3vh;
  background: rgba(255,255,255,0.8);
  border-radius: 40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  transition: all 0.5s ease;
}

/* 🔥 MODO EXPANDIDO */
.central-container.expandido {
  width: 80vw;
  display: flex;
  flex-direction: row;
}

/* IZQUIERDA */
.left-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* DERECHA */
.right-panel {
  flex: 1;
  display: none;
  padding: 20px;
  justify-content: center;
  align-items: center;
}

/* Mostrar resultados */
.central-container.expandido .right-panel {
  display: flex;
}

/* Bot */
#lottie-bot {
  width: 180px;
}

/* Input */
.search-container input {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  width: 70%;
}

/* Cards */
.card {
  background: white;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 200px;
}

/* Logos */
#logo-mbt {
  position: absolute;
  top: 10px;
  left: 20px;
  width: 120px;
}

#logo-ds {
  position: absolute;
  bottom: 10px;
  right: 20px;
  width: 80px;
}
</style>
</head>

<body>

<div id="background-lottie"></div>

<div class="central-container" id="mainContainer">

  <!-- IZQUIERDA -->
  <div class="left-panel">

    <h2>Implementaciones Mainbit</h2>

    <div id="lottie-bot"></div>

    <div class="search-container">
      <input type="text" id="folioInput" placeholder="Escribe el folio a consultar ...">
    </div>

  </div>

  <!-- DERECHA -->
  <div class="right-panel" id="resultado">

    <div>
      <div id="folioLabel" style="font-weight:bold;color:#0078d4;margin-bottom:10px;"></div>

      <div class="card">
        <div>CPU</div>
        <img id="cpu">
      </div>

      <div class="card">
        <div>Monitor</div>
        <img id="monitor">
      </div>

      <div class="card">
        <div>UPS</div>
        <img id="ups">
      </div>
    </div>

  </div>

</div>

<!-- Logos -->
<div id="logo-mbt"></div>
<div id="logo-ds"></div>

<script>
// 🎥 LOTTIE
lottie.loadAnimation({
  container: document.getElementById("background-lottie"),
  path: "./background2.json",
  renderer: "canvas",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("lottie-bot"),
  path: "./Hi_SN_bot.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("logo-mbt"),
  path: "./Logo_Mbt_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("logo-ds"),
  path: "./Logo_DS_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

// 📊 DATA
let baseDatos = [];
let timeout = null;

fetch("data.csv")
  .then(res => res.text())
  .then(text => {
    const filas = text.split("\n").slice(1);
    baseDatos = filas.map(f => {
      const [folio, cpu, monitor, ups] = f.split(",");
      return { folio, cpu, monitor, ups };
    });
  });

// 🔹 Barcode
function generarBarcode(valor) {
  return `https://barcodeapi.org/api/code128/${valor}`;
}

// 🔍 Buscar
function buscar(folioInput) {
  const item = baseDatos.find(x => x.folio === folioInput);

  if (!item) return;

  document.getElementById("mainContainer").classList.add("expandido");

  document.getElementById("folioLabel").innerText = "Folio: " + item.folio;

  document.getElementById("cpu").src = generarBarcode(item.cpu);
  document.getElementById("monitor").src = generarBarcode(item.monitor);
  document.getElementById("ups").src = generarBarcode(item.ups);
}

// ⌨️ Tiempo real
document.getElementById("folioInput").addEventListener("input", function(e) {
  const valor = e.target.value.trim();

  clearTimeout(timeout);

  timeout = setTimeout(() => {
    if (valor.length > 2) {
      buscar(valor);
    }
  }, 300);
});
</script>

</body>
</html>
