<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Implementaciones - Barcodes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
/* ===== RESET Y VIEWPORT ===== */
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

* {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

/* ===== FULLSCREEN ===== */
.fullscreen-container {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* ===== FONDO LOTTIE ===== */
#background-lottie {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.5;
  pointer-events: none;
}

/* ===== CONTENEDOR CENTRAL ===== */
.central-container {
  position: relative;
  z-index: 2;
  width: 45vw;
  height: 85vh;
  background: rgba(236,236,250,.9);
  border-radius: 45px;
  box-shadow: 0 25px 70px rgba(0,0,0,.35);
  display: flex;
  transition: .5s ease;
  backdrop-filter: blur(12px);
}

.central-container.expandido {
  width: 65vw;
}

/* ===== LOGO MAINBIT ===== */
#logo-mbt {
  position: absolute;
  top: 35px;
  left: 45px;
  width: 115px;
  z-index: 5;
}

/* ===== PANEL IZQUIERDO ===== */
.left-panel {
  flex: 1;
  padding: 40px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.central-container.expandido .left-panel {
  border-right: 1px solid rgba(0,0,0,.08);
}

/* TÍTULO */
.left-panel h2 {
  margin-bottom: 22px;
  font-size: 25px;
  font-weight: 700;
  color: #44516b;
  letter-spacing: .2px;
}

/* Bot */
#lottie-bot {
  width: 250px;
  margin-bottom: 22px;
}

/* Input */
.search-container input {
  width: 95%;
  padding: 10px 14px;
  border-radius: 25px;
  border: 2px solid rgba(57,16,123,.75);
  font-size: 14px;
}

.search-container input::placeholder {
  font-size: 12px;
}

.search-container input:focus {
  outline: none;
  border-color: #5f6cff;
}

/* Folio */
#folioLabel {
  margin-top: 16px;
  font-weight: 700;
  font-size: 22px;
  color: #2f6dff;
}

/* ===== PANEL DERECHO ===== */
.right-panel {
  flex: 1;
  margin-top: 10%;
  display: none;
  place-items: center;
  padding: 40px 30px;
  overflow-y: auto;
  scrollbar-width: none;
}

.right-panel::-webkit-scrollbar {
  display: none;
}

.central-container.expandido .right-panel {
  display: flex;
  flex-direction: column;
}

/* ===== CARDS (SIN DEGRADADO) ===== */
.card {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 10px;
  margin-bottom: auto;
}

.card .label {
  min-width: 90px;
  text-align: right;
  font-weight: 700;
  font-size: 18px;
  color: #654E69;
}

.card img {
  width: 310px;
  height: 125px;
  background: white;
  padding: 10px;
  border-radius: 8px;
  cursor: zoom-in;
}

/* ===== OVERLAY BARCODE ===== */
#barcode-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#barcode-overlay img {
  max-width: 90vw;
  max-height: 70vh;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

  /* ✅ PERMITIR SCROLL EN MÓVIL */
  html, body {
    height: auto;
    overflow-y: auto;
  }

  .fullscreen-container {
    position: relative;
    min-height: 100vh;
    height: auto;
  }

  /* ✅ LOGO RESPONSIVO POR % */
  #logo-mbt {
    width: 25%;
    max-width: 70px;
    min-width: 40px;
    left: 25px;
    top: 20px;
  }

  /* ✅ CONTENEDOR EN PLANO VERTICAL */
  .central-container,
  .central-container.expandido {
    width: 95vw;
    height: 85vh;
    flex-direction: column;
    padding-bottom: 20px;
  }

  .left-panel {
    border-right: none !important;
    padding-bottom: 15px;
  }

  /* ✅ NO mostrar tarjetas al inicio */
  .right-panel {
    display: none;
    padding: 10px 20px 30px;
  }

  /* ✅ Mostrar SOLO cuando hay resultados */
  .central-container.expandido .right-panel {
    display: flex;
    flex-direction: column;
  }

  /* ✅ TARJETAS VERTICALES */
  .card {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .card .label {
    text-align: center;
    min-width: auto;
  }

  .card img {
    width: 100%;
    max-width: 330px;
  }
}
</style>
</head>

<body>

<div class="fullscreen-container">
  <div id="background-lottie"></div>

  <div class="central-container" id="mainContainer">

    <div id="logo-mbt"></div>

    <!-- IZQUIERDA -->
    <div class="left-panel">
      <h2>Implementaciones Mainbit</h2>
      <div id="lottie-bot"></div>

      <div class="search-container">
        <input id="folioInput" placeholder="Escribe el folio a consultar..." />
      </div>

      <div id="folioLabel"></div>
    </div>

    <!-- DERECHA -->
    <div class="right-panel">
      <div class="card">
        <span class="label">CPU</span>
        <img id="cpu">
      </div>
      <div class="card">
        <span class="label">Monitor</span>
        <img id="monitor">
      </div>
      <div class="card">
        <span class="label">UPS</span>
        <img id="ups">
      </div>
    </div>

  </div>
</div>

<!-- Overlay -->
<div id="barcode-overlay">
  <img id="barcode-zoom">
</div>

<script>
/* ===== BOT ===== */
const botContainer = document.getElementById("lottie-bot");
let botAnimation = null;

function loadBot(path) {
  if (botAnimation) botAnimation.destroy();
  botAnimation = lottie.loadAnimation({
    container: botContainer,
    path,
    renderer: "svg",
    loop: true,
    autoplay: true
  });
}

loadBot("./Hi_SN_bot.json");

/* ===== BACKGROUND ===== */
lottie.loadAnimation({
  container: document.getElementById("background-lottie"),
  path: "./background1.json",
  renderer: "canvas",
  loop: true,
  autoplay: true,
  rendererSettings: {
    preserveAspectRatio: "xMidYMid slice",
    clearCanvas: true
  }
});

/* Logo */
lottie.loadAnimation({
  container: document.getElementById("logo-mbt"),
  path: "./Logo_Mbt_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

/* ===== DATA ===== */
let baseDatos = [];

fetch("data.csv")
  .then(r => r.text())
  .then(t => {
    baseDatos = t.split("\n").slice(1).map(f => {
      const [folio,cpu,monitor,ups] = f.split(",");
      return {folio,cpu,monitor,ups};
    });
  });

function barcode(v) {
  return `https://barcodeapi.org/api/code128/${v}`;
}

let timeout = null;

folioInput.addEventListener("input", e => {
  const valor = e.target.value.trim();
  clearTimeout(timeout);

  if (!valor) {
    mainContainer.classList.remove("expandido");
    folioLabel.textContent = "";
    loadBot("./Hi_SN_bot.json");
    return;
  }

  timeout = setTimeout(() => {
    const item = baseDatos.find(x => x.folio === valor);
    if (!item) return;

    mainContainer.classList.add("expandido");
    folioLabel.textContent = item.folio;

    cpu.src = barcode(item.cpu);
    monitor.src = barcode(item.monitor);
    ups.src = barcode(item.ups);

    loadBot("./Confused_SN_bot.json");
  }, 400);
});

/* ===== ZOOM BARCODE ===== */
const overlay = document.getElementById("barcode-overlay");
const zoomImg = document.getElementById("barcode-zoom");

document.addEventListener("click", e => {
  if (e.target.tagName === "IMG" && e.target.closest(".card")) {
    zoomImg.src = e.target.src;
    overlay.style.display = "flex";
  }
});

overlay.addEventListener("click", () => {
  overlay.style.display = "none";
  zoomImg.src = "";
});
</script>

</body>
</html>
