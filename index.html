<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Implementaciones - Barcodes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 🔥 FONDO REAL (SIN CAPA BLANCA) */
#background-lottie {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* 🌫️ CAPA SUAVE (opcional ligera) */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.05); /* MUY leve */
  z-index: 1;
}

/* 💎 TARJETA */
.central-container {
  position: relative;
  z-index: 2;
  width: 70vw;
  height: 65vh;
  margin: auto;
  margin-top: 10vh;

  background: rgba(255,255,255,0.85);
  border-radius: 40px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);

  display: flex;
  padding: 30px;
  gap: 20px;
}

/* IZQUIERDA */
.left-panel {
  flex: 1;
  text-align: center;
}

#lottie-bot {
  width: 180px;
  margin: auto;
}

/* INPUT */
.search-container input {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  width: 60%;
}

/* FOLIO ABAJO */
.folio-final {
  margin-top: 20px;
  font-weight: bold;
  color: #0078d4;
  font-size: 18px;
}

/* DERECHA */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 25px;
}

/* ITEM */
.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.item span {
  width: 80px;
  font-weight: bold;
}

.item img {
  width: 250px;
}

/* LOGOS */
#logo-mbt {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 120px;
  z-index: 3;
}

#logo-ds {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 80px;
  z-index: 3;
}
</style>
</head>

<body>

<div id="background-lottie"></div>
<div class="overlay"></div>

<div class="central-container">

  <!-- IZQUIERDA -->
  <div class="left-panel">

    <h2>Implementaciones Mainbit</h2>

    <div id="lottie-bot"></div>

    <div class="search-container">
      <input type="text" id="folioInput" placeholder="Escribe el folio a consultar ...">
    </div>

    <div class="folio-final" id="folioFinal"></div>

  </div>

  <!-- DERECHA -->
  <div class="right-panel">

    <div class="item">
      <span>CPU</span>
      <img id="cpu">
    </div>

    <div class="item">
      <span>Monitor</span>
      <img id="monitor">
    </div>

    <div class="item">
      <span>UPS</span>
      <img id="ups">
    </div>

  </div>

</div>

<div id="logo-mbt"></div>
<div id="logo-ds"></div>

<script>
// 🎥 LOTTIE
lottie.loadAnimation({
  container: document.getElementById("background-lottie"),
  path: "./background2.json",
  renderer: "canvas",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("lottie-bot"),
  path: "./Hi_SN_bot.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("logo-mbt"),
  path: "./Logo_Mbt_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("logo-ds"),
  path: "./Logo_DS_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

// DATA
let baseDatos = [];
fetch("data.csv")
  .then(res => res.text())
  .then(text => {
    const filas = text.split("\n").slice(1);
    baseDatos = filas.map(f => {
      const [folio, cpu, monitor, ups] = f.split(",");
      return { folio, cpu, monitor, ups };
    });
  });

// Barcode
function generarBarcode(valor) {
  return `https://barcodeapi.org/api/code128/${valor}`;
}

// Buscar
document.getElementById("folioInput").addEventListener("input", function(e) {
  const valor = e.target.value.trim();

  if (valor.length < 3) return;

  const item = baseDatos.find(x => x.folio === valor);

  if (!item) return;

  document.getElementById("folioFinal").innerText = item.folio;

  document.getElementById("cpu").src = generarBarcode(item.cpu);
  document.getElementById("monitor").src = generarBarcode(item.monitor);
  document.getElementById("ups").src = generarBarcode(item.ups);
});
</script>

</body>
</html>
